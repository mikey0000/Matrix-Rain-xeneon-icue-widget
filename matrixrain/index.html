<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>tr('Matrix Rain')</title>
  <link rel="icon" type="image/svg+xml" href="resources/matrixrain.svg">

  <!-- Matrix Rain Settings -->
  <meta name="x-icue-property" content="charSet"
        data-label="tr('Character Set')"
        data-type="combobox"
        data-default="'katakana'"
        data-values="[{'key':'katakana','value':tr('Katakana')},{'key':'latin','value':tr('Latin')},{'key':'binary','value':tr('Binary')},{'key':'mix','value':tr('Mix')}]">

  <meta name="x-icue-property" content="fallSpeed"
        data-label="tr('Fall Speed')"
        data-type="slider"
        data-default="5"
        data-min="1"
        data-max="10"
        data-step="1">

  <meta name="x-icue-property" content="density"
        data-label="tr('Column Density')"
        data-type="slider"
        data-default="5"
        data-min="1"
        data-max="10"
        data-step="1">

  <meta name="x-icue-property" content="fontSize"
        data-label="tr('Font Size')"
        data-type="slider"
        data-default="14"
        data-min="8"
        data-max="28"
        data-step="2"
        data-unit-label="'px'">

  <meta name="x-icue-property" content="tailLength"
        data-label="tr('Tail Length')"
        data-type="slider"
        data-default="15"
        data-min="3"
        data-max="40"
        data-step="1">

  <!-- Widget Personalization -->
  <meta name="x-icue-property" content="textColor"
        data-label="tr('Text Color')"
        data-type="color"
        data-default="'#00ff41'">

  <meta name="x-icue-property" content="accentColor"
        data-label="tr('Accent Color')"
        data-type="color"
        data-default="'#80ff80'">

  <meta name="x-icue-property" content="backgroundColor"
        data-label="tr('Background Color')"
        data-type="color"
        data-default="'#000000'">

  <meta name="x-icue-property" content="backgroundMedia"
        data-label="tr('Background Image')"
        data-type="media-selector"
        data-filters="['*.png','*.jpg','*.jpeg','*.webp','*.mp4','*.webm']">

  <meta name="x-icue-property" content="glassBlur"
        data-label="tr('Glass Blur')"
        data-type="slider"
        data-default="0"
        data-min="0"
        data-max="30"
        data-step="1">

  <meta name="x-icue-property" content="transparency"
        data-label="tr('Background Transparency')"
        data-type="slider"
        data-default="100"
        data-min="0"
        data-max="100"
        data-step="1">

  <script id="x-icue-groups" type="application/json">
  [
    {
      "title": "tr('Matrix Rain')",
      "properties": ["charSet", "fallSpeed", "density", "fontSize", "tailLength"]
    },
    {
      "title": "tr('Widget Personalization')",
      "properties": ["textColor", "accentColor", "backgroundColor", "backgroundMedia", "glassBlur", "transparency"]
    }
  ]
  </script>

  <!-- MediaViewer — inlined to avoid iCUE file:// script-loading restrictions -->
  <style>
  .position-container { position: absolute; transform-origin: top left; }
  .scale-container { transform-origin: top left; }
  .rotation-container { transform-origin: center center; }
  .rotation-container img, .rotation-container video { display: block; object-fit: contain; }
  </style>
  <script>
  class MediaViewer {
    constructor(options = {}) {
      this.container = options.container;
      this.onMediaLoaded = options.onMediaLoaded || (() => {});
      this.onMediaError = options.onMediaError || (() => {});
      this.debug = options.debug || false;
      this.positionContainer = null; this.scaleContainer = null; this.rotationContainer = null;
      this.mediaElement = null; this.currentMediaPath = null;
      this.supportedImageFormats = ["jpg","jpeg","png","gif","bmp","webp","svg","ico"];
      this.supportedVideoFormats = ["mp4","webm","ogg","mov","avi","mkv"];
      if (!this.container) throw new Error("MediaViewer: container is required");
    }
    getFileExtension(p) { return p.split(".").pop().toLowerCase(); }
    isImageFile(e) { return this.supportedImageFormats.includes(e); }
    isVideoFile(e) { return this.supportedVideoFormats.includes(e); }
    log(...a) { if (this.debug) console.log("[MediaViewer]", ...a); }
    warn(...a) { if (this.debug) console.warn("[MediaViewer]", ...a); }
    error(...a) { console.error("[MediaViewer]", ...a); }
    createImageElement(filePath) {
      const img = document.createElement("img");
      img.src = filePath;
      img.onerror = () => { this.error("Failed to load image:", filePath); this.onMediaError(new Error("Failed to load image: " + filePath)); };
      img.onload  = () => { this.log("Image loaded:", filePath); this.onMediaLoaded(img); };
      return img;
    }
    createVideoElement(filePath) {
      const video = document.createElement("video");
      video.controls = false; video.autoplay = true; video.loop = true; video.muted = true; video.playsInline = true;
      video.addEventListener("loadeddata", () => {
        video.play().then(() => { this.onMediaLoaded(video); }).catch(e => { this.error("Error playing video:", e); this.onMediaError(e); });
      });
      video.addEventListener("error", e => { this.error("Video error:", e); this.onMediaError(new Error("Video error: " + (video.error?.message || "Unknown"))); });
      video.src = filePath;
      return video;
    }
    createMediaElement(filePath) {
      const ext = this.getFileExtension(filePath);
      if (this.isImageFile(ext)) return this.createImageElement(filePath);
      if (this.isVideoFile(ext)) return this.createVideoElement(filePath);
      this.error("Unsupported format:", ext); this.onMediaError(new Error("Unsupported format: " + ext)); return null;
    }
    createContainers() {
      this.positionContainer = document.createElement("div"); this.positionContainer.className = "position-container";
      this.scaleContainer    = document.createElement("div"); this.scaleContainer.className    = "scale-container";
      this.rotationContainer = document.createElement("div"); this.rotationContainer.className = "rotation-container";
      this.rotationContainer.appendChild(this.mediaElement);
      this.scaleContainer.appendChild(this.rotationContainer);
      this.positionContainer.appendChild(this.scaleContainer);
      return this.positionContainer;
    }
    applyTransform(params = {}) {
      if (!this.positionContainer) return;
      const baseWidth = params.baseWidth || 100; const baseHeight = params.baseHeight || 100;
      const scaleValue = params.scale !== undefined ? params.scale : 1;
      const posX = params.positionX || 0; const posY = params.positionY || 0; const rotation = params.angle || 0;
      const minScale = Math.min(this.container.clientWidth / baseWidth, this.container.clientHeight / baseHeight);
      this.positionContainer.style.transform = `translate(${posX * minScale}px, ${posY * minScale}px)`;
      this.scaleContainer.style.transform    = `scale(${scaleValue * minScale})`;
      this.rotationContainer.style.transform = `rotate(${rotation}deg)`;
    }
    loadMedia(params = {}) {
      const filePath = params.path; if (!filePath) { this.clear(); return; }
      const decoded = decodeURIComponent(filePath);
      if (this.currentMediaPath === decoded) { this.applyTransform(params); return; }
      this.clear();
      this.mediaElement = this.createMediaElement(decoded); if (!this.mediaElement) return;
      this.container.appendChild(this.createContainers());
      this.container.style.visibility = "visible";
      this.applyTransform(params); this.currentMediaPath = decoded;
    }
    clear() {
      this.container.innerHTML = ""; this.container.style.visibility = "hidden";
      this.positionContainer = this.scaleContainer = this.rotationContainer = this.mediaElement = this.currentMediaPath = null;
    }
    destroy() { this.clear(); this.container = this.onMediaLoaded = this.onMediaError = null; }
  }
  </script>

  <link rel="stylesheet" type="text/css" href="styles/MatrixRain.css">
</head>
<body>
  <div class="widget-root">
    <div class="widget-background" aria-hidden="true">
      <div class="main-glass"></div>
      <div id="media-background"></div>
    </div>
    <canvas id="rain-canvas" aria-hidden="true"></canvas>
  </div>

  <script>
    // ---------------------------------------------------------------------------
    // iCUE event binding — bare assignment intentional (no var/let/const)
    // ---------------------------------------------------------------------------
    icueEvents = {
      'onDataUpdated': onIcueDataUpdated,
      'onICUEInitialized': onIcueInitialized
    };

    // ---------------------------------------------------------------------------
    // Character sets
    // ---------------------------------------------------------------------------
    var CHAR_SETS = {
      katakana: 'ｦｧｨｩｪｫｬｭｮｯｱｲｳｴｵｶｷｸｹｺｻｼｽｾｿﾀﾁﾂﾃﾄﾅﾆﾇﾈﾉﾊﾋﾌﾍﾎﾏﾐﾑﾒﾓﾔﾕﾖﾗﾘﾙﾚﾛﾜﾝ',
      latin:    'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*()[]{}<>?/\\|',
      binary:   '01',
      mix:      'ｦｧｨｩｪｫｬｭｮｯｱｲｳｴｵABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%01'
    };

    // ---------------------------------------------------------------------------
    // Runtime state
    // ---------------------------------------------------------------------------
    var canvas, ctx;
    var drops = [];
    var colTrailLen = [];  // per-column trail length variation
    var colSpeed    = [];  // per-column step interval multiplier (1–3 ticks)
    var colTick     = [];  // per-column tick counter
    var charGrid    = [];  // 2D: charGrid[col][row & 255] — avoids string key lookups
    var numCols  = 0;
    var animId   = null;
    var lastTime = 0;
    var stepCount = 0;     // global step counter for film-accurate 3-frame char timing

    // Cached per-frame constants (recomputed only when properties change)
    var cachedFont      = '14px monospace';
    var cachedBaseTrail = 15;
    var cachedResetWait = 40;

    var currentCharSet   = 'katakana';
    var currentSpeed     = 5;
    var currentDensity   = 5;
    var currentFontSize  = 14;
    var currentTailLength = 15;
    var trailColor = '#00ff41';
    var headColor  = '#80ff80';

    // ---------------------------------------------------------------------------
    // Helpers
    // ---------------------------------------------------------------------------
    function getIcueProperty(name) {
      if (typeof window !== 'undefined' && Object.prototype.hasOwnProperty.call(window, name)) {
        var value = window[name];
        if (value !== undefined && value !== null && value !== '') return value;
      }
      try {
        var value2 = Function('return typeof ' + name + ' !== "undefined" ? ' + name + ' : undefined')();
        if (value2 !== undefined && value2 !== null && value2 !== '') return value2;
      } catch (e) {}
      return undefined;
    }

    function clampRange(v, min, max, def) {
      v = Number(v);
      if (!Number.isFinite(v)) return def;
      return Math.max(min, Math.min(max, v));
    }

    function mapRange(v, a, b, c, d) {
      return c + (d - c) * (v - a) / (b - a);
    }

    function getChar() {
      var set = CHAR_SETS[currentCharSet] || CHAR_SETS.katakana;
      return set[Math.floor(Math.random() * set.length)];
    }

    function getGridChar(col, row) {
      // Film-accurate: characters change every 3 global steps (~2% of cells per eligible frame)
      var idx = row & 255;
      if (!charGrid[col]) charGrid[col] = [];
      if (!charGrid[col][idx] || (stepCount % 3 === 0 && Math.random() > 0.98)) {
        charGrid[col][idx] = getChar();
      }
      return charGrid[col][idx];
    }

    function resolveMediaPath(value) {
      if (!value) return '';
      if (typeof value === 'string') return value;
      if (value.pathToAsset) return value.pathToAsset;
      if (value.path) return value.path;
      return '';
    }

    function normalizeMediaConfig(rawMedia) {
      var mediaPath = resolveMediaPath(rawMedia);
      if (!mediaPath) return null;
      var base = (rawMedia && typeof rawMedia === 'object') ? rawMedia : {};
      return {
        path:       base.pathToAsset || mediaPath,
        baseWidth:  Number(base.baseWidth)  || Number(base.baseSizeX) || 0,
        baseHeight: Number(base.baseHeight) || Number(base.baseSizeY) || 0,
        scale:      Number.isFinite(Number(base.scale)) ? Number(base.scale) : 1,
        positionX:  Number(base.positionX) || 0,
        positionY:  Number(base.positionY) || 0,
        angle:      Number(base.angle)     || 0
      };
    }

    // ---------------------------------------------------------------------------
    // Media background
    // ---------------------------------------------------------------------------
    var mediaMount = document.getElementById('media-background');

    function createMediaBackgroundComponent(container) {
      if (!container) return { clear: function() {}, loadMedia: function() {} };
      if (typeof MediaViewer === 'function') {
        var viewer = new MediaViewer({
          container: container,
          onMediaLoaded: function() {},
          onMediaError: function(e) { console.error('Media error:', e); }
        });
        return {
          clear:     function()     { viewer.clear(); },
          loadMedia: function(cfg)  { viewer.loadMedia(cfg); }
        };
      }
      // Static fallback for browser testing
      return {
        clear: function() {
          container.style.backgroundImage = '';
          container.style.visibility = 'hidden';
        },
        loadMedia: function(cfg) {
          var p = cfg && (cfg.path || resolveMediaPath(cfg));
          if (!p) { container.style.backgroundImage = ''; return; }
          container.style.backgroundImage = "url('" + String(p).replace(/\\/g, '\\\\').replace(/'/g, "\\'") + "')";
          container.style.backgroundRepeat = 'no-repeat';
          container.style.backgroundSize   = 'cover';
          container.style.backgroundPosition = 'center';
          container.style.visibility = 'visible';
        }
      };
    }

    var mediaBackgroundComponent = createMediaBackgroundComponent(mediaMount);

    // ---------------------------------------------------------------------------
    // Canvas animation
    // ---------------------------------------------------------------------------
    function initCanvas() {
      canvas = document.getElementById('rain-canvas');
      if (!canvas) return;
      ctx = canvas.getContext('2d');

      canvas.width  = canvas.offsetWidth  || 480;
      canvas.height = canvas.offsetHeight || 480;

      numCols     = Math.max(1, Math.floor(canvas.width / currentFontSize));
      drops       = [];
      colTrailLen = [];
      colSpeed    = [];
      colTick     = [];
      charGrid    = [];
      stepCount   = 0;

      // Update cached constants
      cachedFont      = currentFontSize + 'px monospace';
      cachedBaseTrail = currentTailLength;
      cachedResetWait = Math.floor(mapRange(currentDensity, 1, 10, 80, 3));

      for (var i = 0; i < numCols; i++) {
        // Each column gets a unique trail length (±40% of base)
        colTrailLen[i] = Math.max(3, Math.round(cachedBaseTrail * (0.6 + Math.random() * 0.8)));
        // Each column steps every 1, 2, or 3 global ticks independently
        colSpeed[i] = 1 + Math.floor(Math.random() * 3);
        colTick[i]  = Math.floor(Math.random() * colSpeed[i]);
        // Stagger initial positions widely so columns don't all start together
        drops[i] = -Math.floor(Math.random() * (cachedResetWait * 2 + colTrailLen[i])) - 1;
      }

      lastTime = 0;
    }

    function draw(ts) {
      animId = requestAnimationFrame(draw);

      var interval = Math.round(mapRange(currentSpeed, 1, 10, 150, 15));
      if (ts - lastTime < interval) return;
      lastTime = ts;

      if (!canvas || !ctx) return;

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.font        = cachedFont;
      ctx.textBaseline = 'top';

      var fw          = currentFontSize;
      var cw          = canvas.width;
      var ch          = canvas.height;
      var baseTrail   = cachedBaseTrail;
      var resetWait   = cachedResetWait;

      stepCount++;

      // --- Pass 1: trail characters (fillStyle set once) ---
      ctx.fillStyle = trailColor;
      for (var col = 0; col < drops.length; col++) {
        var trailLen = colTrailLen[col] || baseTrail;
        var headRow  = drops[col];
        if (headRow < -trailLen) continue; // not yet visible

        var x = col * fw;
        for (var t = trailLen; t >= 1; t--) {
          var row = headRow - t;
          var y   = row * fw;
          if (y < -fw || y >= ch) continue;

          var frac  = 1 - (t / trailLen);
          ctx.globalAlpha = frac * frac * 0.92 + 0.02;
          ctx.fillText(getGridChar(col, row), x, y);
        }
      }

      // --- Pass 2: head characters (fillStyle set once) ---
      ctx.fillStyle   = headColor;
      ctx.globalAlpha = 1;
      for (var col = 0; col < drops.length; col++) {
        var trailLen = colTrailLen[col] || baseTrail;
        var headRow  = drops[col];
        if (headRow < -trailLen) continue;

        var headY = headRow * fw;
        if (headY >= -fw && headY < ch) {
          ctx.fillText(getGridChar(col, headRow), col * fw, headY);
        }
      }

      ctx.globalAlpha = 1;

      // --- Advance columns ---
      for (var col = 0; col < drops.length; col++) {
        var trailLen = colTrailLen[col] || baseTrail;
        var headRow  = drops[col];

        // Waiting to enter — advance every tick regardless of colSpeed
        if (headRow < -trailLen) {
          drops[col]++;
          continue;
        }

        colTick[col]++;
        if (colTick[col] >= colSpeed[col]) {
          colTick[col] = 0;
          drops[col]++;

          if ((headRow - trailLen) * fw > ch) {
            colTrailLen[col] = Math.max(3, Math.round(baseTrail * (0.6 + Math.random() * 0.8)));
            colSpeed[col]    = 1 + Math.floor(Math.random() * 3);
            drops[col]       = -resetWait - Math.floor(Math.random() * (resetWait + 1));
          }
        }
      }
    }

    function startAnimation() {
      if (animId) {
        cancelAnimationFrame(animId);
        animId = null;
      }
      initCanvas();
      animId = requestAnimationFrame(draw);
    }

    function stopAnimation() {
      if (animId) {
        cancelAnimationFrame(animId);
        animId = null;
      }
    }

    // ---------------------------------------------------------------------------
    // Styles & property application
    // ---------------------------------------------------------------------------
    function applyStyles() {
      var root = document.documentElement;

      var bgTransparency = clampRange(getIcueProperty('transparency'), 0, 100, 100) / 100;
      root.style.setProperty('--bg-opacity', bgTransparency);

      var bgc = getIcueProperty('backgroundColor');
      root.style.setProperty('--bg-color', (typeof bgc === 'string' && bgc) ? bgc : '#000000');
      root.style.setProperty('--bg-blur',  clampRange(getIcueProperty('glassBlur'), 0, 30, 0) + 'px');

      var bgMedia = getIcueProperty('backgroundMedia');
      if (!bgMedia) {
        mediaBackgroundComponent.clear();
      } else {
        var mediaConfig = normalizeMediaConfig(bgMedia);
        if (mediaConfig) mediaBackgroundComponent.loadMedia(mediaConfig);
        else mediaBackgroundComponent.clear();
      }
    }

    function applyRainProperties() {
      var newCharSet    = getIcueProperty('charSet')     || 'katakana';
      var newSpeed      = clampRange(getIcueProperty('fallSpeed'),   1, 10, 5);
      var newDensity    = clampRange(getIcueProperty('density'),     1, 10, 5);
      var newFontSize   = clampRange(getIcueProperty('fontSize'),    8, 28, 14);
      var newTailLength = clampRange(getIcueProperty('tailLength'),  3, 40, 15);
      var newTrail      = getIcueProperty('textColor')   || '#00ff41';
      var newHead       = getIcueProperty('accentColor') || '#80ff80';

      var charSetChanged  = newCharSet    !== currentCharSet;
      var fontSizeChanged = newFontSize   !== currentFontSize;
      var densityChanged  = newDensity    !== currentDensity;
      var tailChanged     = newTailLength !== currentTailLength;

      currentCharSet    = newCharSet;
      currentSpeed      = newSpeed;
      currentDensity    = newDensity;
      currentFontSize   = newFontSize;
      currentTailLength = newTailLength;
      trailColor        = newTrail;
      headColor         = newHead;

      // Update cached constants that change without a full reinit
      if (densityChanged) cachedResetWait = Math.floor(mapRange(newDensity, 1, 10, 80, 3));
      if (tailChanged)    cachedBaseTrail = newTailLength;

      if (charSetChanged)  charGrid = [];
      if (fontSizeChanged) { stopAnimation(); startAnimation(); }
    }

    // ---------------------------------------------------------------------------
    // iCUE callbacks
    // ---------------------------------------------------------------------------
    function onIcueDataUpdated() {
      applyStyles();
      applyRainProperties();
    }

    function onIcueInitialized() {
      onIcueDataUpdated();
    }

    // ---------------------------------------------------------------------------
    // Resize handling
    // ---------------------------------------------------------------------------
    var resizeObserver = new ResizeObserver(function() {
      stopAnimation();
      startAnimation();
    });
    resizeObserver.observe(document.body);

    // ---------------------------------------------------------------------------
    // Initial render (browser testing + iCUE late-init)
    // ---------------------------------------------------------------------------
    if (typeof iCUE_initialized !== 'undefined' && iCUE_initialized) {
      onIcueInitialized();
    } else {
      onIcueDataUpdated();
      startAnimation();
    }
  </script>
</body>
</html>
